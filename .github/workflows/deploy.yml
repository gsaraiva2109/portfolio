name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_WEB3FORMS_ACCESS_KEY=${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}
            VITE_GITHUB_URL=${{ secrets.VITE_GITHUB_URL }}
            VITE_LINKEDIN_URL=${{ secrets.VITE_LINKEDIN_URL }}
            VITE_PORTFOLIO_URL=${{ secrets.VITE_PORTFOLIO_URL }}
            VITE_EMAIL=${{ secrets.VITE_EMAIL }}
            VITE_PHONE=${{ secrets.VITE_PHONE }}
            VITE_LOCATION=${{ secrets.VITE_LOCATION }}
      
      - name: Trigger Dokploy Redeploy
        run: curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"